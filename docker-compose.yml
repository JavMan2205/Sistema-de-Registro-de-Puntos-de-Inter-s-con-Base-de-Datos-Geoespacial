services:
  # 1: La Base de Datos
  db:
    image: postgis/postgis:15-3.3
    container_name: geo_db
    restart: always
    environment:
      - POSTGRES_USER=javier_admin
      - POSTGRES_PASSWORD=tu_password_segura
      - POSTGRES_DB=geodb
    volumes:
      - geo_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - geo_network

  # 2: El Backend 
  backend:
    build: ./backend
    container_name: geo_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    networks:
      - geo_network

  # 3: El Proxy
  proxy:
    image: nginx:alpine
    container_name: geo_proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - geo_network

networks:
  geo_network:
    driver: bridge

volumes:
  geo_data: